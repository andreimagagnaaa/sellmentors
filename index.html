<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>SellMentors | Consultoria e Treinamento de Vendas B2B</title>
    <meta name="description" content="A SellMentors transforma operações comerciais B2B com mentoria, treinamento de times de vendas e Gerente de Vendas On Demand. Mais de 20 anos de experiência em empresas globais." />
    <meta name="keywords" content="SellMentors, consultoria de vendas, treinamento de vendas, mentoria comercial, gestão comercial, gerente de vendas on demand, vendas B2B, alta performance em vendas" />
    <meta name="author" content="SellMentors" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.sellmentors.com.br/" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SellMentors" />
    <meta property="og:url" content="https://www.sellmentors.com.br/" />
    <meta property="og:title" content="SellMentors | Consultoria e Treinamento de Vendas B2B" />
    <meta property="og:description" content="Transformamos operações comerciais B2B com mentoria, treinamento e gestão de times de vendas. Mais de 20 anos de experiência em empresas globais." />
    <meta property="og:image" content="https://www.sellmentors.com.br/identidade/linkedin-cover-horizontal-right.svg" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SellMentors | Consultoria e Treinamento de Vendas B2B" />
    <meta name="twitter:description" content="Transformamos operações comerciais B2B com mentoria, treinamento e gestão de times de vendas." />
    <meta name="twitter:image" content="https://www.sellmentors.com.br/identidade/linkedin-cover-horizontal-right.svg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "SellMentors",
      "url": "https://www.sellmentors.com.br/",
      "logo": "https://www.sellmentors.com.br/identidade/sm-logo-horizontal.svg",
      "image": "https://www.sellmentors.com.br/identidade/linkedin-cover-horizontal-right.svg",
      "description": "Consultoria, mentoria e treinamento de vendas B2B com mais de 20 anos de experiência em empresas globais. Serviços: mentoria individual, treinamento de times e Gerente de Vendas On Demand.",
      "email": "contato@sellmentors.com.br",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "BR"
      },
      "sameAs": [
        "https://www.linkedin.com/company/sellmentors"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços SellMentors",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Mentoria Individual de Vendas",
              "description": "Mentoria personalizada para profissionais de vendas que buscam alta performance."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Treinamento de Times Comerciais",
              "description": "Treinamento estruturado para equipes de vendas B2B focado em fechamento e processo comercial."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Gerente de Vendas On Demand",
              "description": "Gestão prática do time comercial, definição de metas, forecast e acompanhamento de vendedores sem o custo fixo de um executivo sênior."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
